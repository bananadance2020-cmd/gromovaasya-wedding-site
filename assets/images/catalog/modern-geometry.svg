<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <filter id="card-shadow" x="-10%" y="-5%" width="130%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#1A1816" flood-opacity="0.15"/>
    </filter>
    <filter id="phone-shadow" x="-10%" y="-5%" width="130%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1A1816" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="tiffany-block" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ECDC0"/>
      <stop offset="100%" stop-color="#4A9E91"/>
    </linearGradient>
    <linearGradient id="gold-block" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#9E7D3E"/>
    </linearGradient>
    <clipPath id="card-clip">
      <rect x="0" y="0" width="240" height="460" rx="2" ry="2"/>
    </clipPath>
  </defs>

  <!-- Background - bold neutral -->
  <rect width="400" height="600" fill="#E0DDD6"/>

  <!-- Phone mockup silhouette -->
  <g filter="url(#phone-shadow)">
    <rect x="55" y="30" width="290" height="540" rx="35" ry="35" fill="#1A1816"/>
    <rect x="60" y="38" width="280" height="524" rx="30" ry="30" fill="#FAFAF8"/>
    <rect x="165" y="38" width="70" height="14" rx="7" ry="7" fill="#1A1816"/>
    <rect x="62" y="54" width="276" height="506" rx="0" ry="0" fill="#FFFFFF"/>
  </g>

  <!-- Invitation card inside phone -->
  <g transform="translate(82, 75) rotate(-0.8) scale(0.96)" filter="url(#card-shadow)">
    <!-- Card background - white -->
    <rect x="0" y="0" width="240" height="460" rx="2" ry="2" fill="#FFFFFF"/>

    <g clip-path="url(#card-clip)">
      <!-- Bold geometric block - top left triangle -->
      <polygon points="0,0 120,0 0,100" fill="url(#tiffany-block)" opacity="0.9"/>

      <!-- Geometric accent - right side stripe -->
      <rect x="200" y="0" width="40" height="180" fill="url(#gold-block)" opacity="0.85"/>

      <!-- Diagonal line accent -->
      <line x1="0" y1="100" x2="200" y2="0" stroke="#1A1816" stroke-width="1.5"/>

      <!-- Bottom geometric block -->
      <polygon points="240,460 120,460 240,380" fill="url(#tiffany-block)" opacity="0.7"/>

      <!-- Thin geometric lines -->
      <line x1="40" y1="390" x2="200" y2="390" stroke="#1A1816" stroke-width="0.8"/>
      <line x1="40" y1="395" x2="180" y2="395" stroke="#C9A96E" stroke-width="0.5"/>

      <!-- Geometric circle accent -->
      <circle cx="210" cy="420" r="15" fill="none" stroke="#C9A96E" stroke-width="1" opacity="0.6"/>
      <circle cx="210" cy="420" r="8" fill="none" stroke="#7ECDC0" stroke-width="0.7" opacity="0.5"/>

      <!-- Small triangle accent -->
      <polygon points="30,370 40,355 50,370" fill="none" stroke="#1A1816" stroke-width="0.8"/>

      <!-- Geometric diamond -->
      <polygon points="220,200 228,210 220,220 212,210" fill="#C9A96E" opacity="0.5"/>
    </g>

    <!-- Content overlay -->
    <!-- Overline -->
    <text x="110" y="140" text-anchor="middle" font-family="'Inter', sans-serif" font-size="7" fill="#A8A296" letter-spacing="0.35em" font-weight="500">WEDDING INVITATION</text>

    <!-- Bold names -->
    <text x="110" y="190" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="34" fill="#1A1816" font-weight="700">Анна</text>

    <!-- Ampersand in geometric style -->
    <text x="110" y="218" text-anchor="middle" font-family="'Inter', sans-serif" font-size="18" fill="#7ECDC0" font-weight="700">&amp;</text>

    <text x="110" y="258" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="34" fill="#1A1816" font-weight="700">Дмитрий</text>

    <!-- Bold date block -->
    <rect x="55" y="280" width="110" height="28" rx="0" ry="0" fill="#1A1816"/>
    <text x="110" y="299" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#FFFFFF" letter-spacing="0.1em" font-weight="500">15.08.2026</text>

    <!-- Time -->
    <text x="110" y="335" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#4A4640" letter-spacing="0.15em" font-weight="500">16:00</text>

    <!-- Venue -->
    <text x="110" y="360" text-anchor="middle" font-family="'Inter', sans-serif" font-size="8" fill="#8A8578" letter-spacing="0.05em">Усадьба «Лесная поляна»</text>
  </g>

  <!-- Phone home indicator -->
  <rect x="170" y="550" width="60" height="4" rx="2" fill="#1A1816" opacity="0.3"/>
</svg>
