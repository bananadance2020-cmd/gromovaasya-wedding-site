<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <filter id="card-shadow" x="-10%" y="-5%" width="130%" height="120%">
      <feDropShadow dx="1" dy="3" stdDeviation="5" flood-color="#1A1816" flood-opacity="0.08"/>
    </filter>
    <filter id="phone-shadow" x="-10%" y="-5%" width="130%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1A1816" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background - soft neutral -->
  <rect width="400" height="600" fill="#F0EEE9"/>

  <!-- Phone mockup silhouette -->
  <g filter="url(#phone-shadow)">
    <rect x="55" y="30" width="290" height="540" rx="35" ry="35" fill="#1A1816"/>
    <rect x="60" y="38" width="280" height="524" rx="30" ry="30" fill="#FFFFFF"/>
    <!-- Phone notch -->
    <rect x="165" y="38" width="70" height="14" rx="7" ry="7" fill="#1A1816"/>
    <!-- Phone screen area -->
    <rect x="62" y="54" width="276" height="506" rx="0" ry="0" fill="#FFFFFF"/>
  </g>

  <!-- Invitation card inside phone -->
  <g transform="translate(82, 75) rotate(-1) scale(0.96)" filter="url(#card-shadow)">
    <!-- Card background - pure white -->
    <rect x="0" y="0" width="240" height="460" rx="2" ry="2" fill="#FFFFFF"/>

    <!-- Thin grey border -->
    <rect x="15" y="15" width="210" height="430" rx="1" ry="1" fill="none" stroke="#E0DDD6" stroke-width="0.75"/>

    <!-- Minimal top spacing - lots of air -->
    <!-- Overline -->
    <text x="120" y="100" text-anchor="middle" font-family="'Inter', sans-serif" font-size="7" fill="#A8A296" letter-spacing="0.3em" font-weight="400">ПРИГЛАШЕНИЕ НА СВАДЬБУ</text>

    <!-- Thin line -->
    <line x1="85" y1="112" x2="155" y2="112" stroke="#E0DDD6" stroke-width="0.5"/>

    <!-- Names - elegant, light -->
    <text x="120" y="175" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="32" fill="#1A1816" font-weight="400">Анна</text>

    <!-- Ampersand - subtle -->
    <text x="120" y="200" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="16" fill="#A8A296" font-weight="400">&amp;</text>

    <text x="120" y="235" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="32" fill="#1A1816" font-weight="400">Дмитрий</text>

    <!-- Thin line -->
    <line x1="75" y1="255" x2="165" y2="255" stroke="#E0DDD6" stroke-width="0.5"/>

    <!-- Date - clean -->
    <text x="120" y="290" text-anchor="middle" font-family="'Inter', sans-serif" font-size="11" fill="#4A4640" letter-spacing="0.08em" font-weight="400">15 августа 2026</text>

    <!-- Time - lighter -->
    <text x="120" y="310" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" fill="#8A8578" letter-spacing="0.05em" font-weight="400">16:00</text>

    <!-- Venue - very subtle -->
    <text x="120" y="345" text-anchor="middle" font-family="'Inter', sans-serif" font-size="7.5" fill="#A8A296" letter-spacing="0.05em" font-weight="400">Усадьба «Лесная поляна»</text>

    <!-- Bottom spacing - more air -->
    <line x1="95" y1="400" x2="145" y2="400" stroke="#E0DDD6" stroke-width="0.5"/>
  </g>

  <!-- Phone home indicator -->
  <rect x="170" y="550" width="60" height="4" rx="2" fill="#1A1816" opacity="0.3"/>
</svg>
