<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <filter id="shadow" x="-10%" y="-5%" width="130%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1A1816" flood-opacity="0.15"/>
    </filter>
    <filter id="soft-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#1A1816" flood-opacity="0.1"/>
    </filter>
    <filter id="metallic-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="screen-luxury" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF8"/>
      <stop offset="50%" stop-color="#F0EEE9"/>
      <stop offset="100%" stop-color="#FAFAF8"/>
    </linearGradient>
    <linearGradient id="marble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAF8"/>
      <stop offset="20%" stop-color="#F0EEE9"/>
      <stop offset="25%" stop-color="#E8E5DF"/>
      <stop offset="30%" stop-color="#F0EEE9"/>
      <stop offset="55%" stop-color="#FAFAF8"/>
      <stop offset="60%" stop-color="#E0DDD6"/>
      <stop offset="65%" stop-color="#F0EEE9"/>
      <stop offset="100%" stop-color="#FAFAF8"/>
    </linearGradient>
    <linearGradient id="marble-vein" x1="0" y1="0" x2="1" y2="0.8">
      <stop offset="0%" stop-color="#D0CDC6" stop-opacity="0"/>
      <stop offset="30%" stop-color="#C5C0B6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#B5B0A6" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#C5C0B6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D0CDC6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0DDD6"/>
      <stop offset="25%" stop-color="#C5C0B6"/>
      <stop offset="50%" stop-color="#8A8578"/>
      <stop offset="75%" stop-color="#C5C0B6"/>
      <stop offset="100%" stop-color="#E0DDD6"/>
    </linearGradient>
    <linearGradient id="chrome-h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E0DDD6"/>
      <stop offset="30%" stop-color="#C5C0B6"/>
      <stop offset="50%" stop-color="#8A8578"/>
      <stop offset="70%" stop-color="#C5C0B6"/>
      <stop offset="100%" stop-color="#E0DDD6"/>
    </linearGradient>
    <clipPath id="phone-clip">
      <rect x="40" y="20" width="320" height="560" rx="36" ry="36"/>
    </clipPath>
    <clipPath id="card-clip">
      <rect x="55" y="130" width="290" height="350" rx="4" ry="4"/>
    </clipPath>
  </defs>

  <!-- Phone body -->
  <rect x="36" y="16" width="328" height="568" rx="40" ry="40" fill="#1A1816" filter="url(#shadow)"/>
  <rect x="40" y="20" width="320" height="560" rx="36" ry="36" fill="url(#screen-luxury)"/>
  
  <!-- Notch -->
  <rect x="150" y="20" width="100" height="24" rx="12" ry="12" fill="#1A1816"/>
  <circle cx="185" cy="32" r="4" fill="#4A4640" opacity="0.5"/>
  <circle cx="200" cy="32" r="3" fill="#4A4640" opacity="0.3"/>

  <!-- Screen content -->
  <g clip-path="url(#phone-clip)">
    <!-- Marble texture background for card area -->
    <g clip-path="url(#card-clip)">
      <rect x="55" y="130" width="290" height="350" fill="url(#marble)"/>
      <!-- Marble veins -->
      <path d="M55,180 Q100,170 150,190 Q200,210 250,185 Q300,160 345,195" fill="none" stroke="url(#marble-vein)" stroke-width="1.5"/>
      <path d="M55,250 Q120,240 180,265 Q240,290 300,255 Q320,245 345,260" fill="none" stroke="url(#marble-vein)" stroke-width="1" opacity="0.6"/>
      <path d="M55,350 Q100,340 160,360 Q220,380 280,350 Q310,335 345,355" fill="none" stroke="url(#marble-vein)" stroke-width="0.8" opacity="0.4"/>
    </g>

    <!-- Card border - metallic -->
    <rect x="55" y="130" width="290" height="350" rx="4" ry="4" fill="none" stroke="url(#chrome)" stroke-width="1.5"/>

    <!-- Geometric accents -->
    <!-- Top left triangle -->
    <g transform="translate(75, 145)" opacity="0.15">
      <path d="M0,0 L25,0 L0,25 Z" fill="none" stroke="#1A1816" stroke-width="0.5"/>
      <path d="M0,0 L15,0 L0,15 Z" fill="#1A1816" opacity="0.1"/>
    </g>
    <!-- Top right hexagon -->
    <g transform="translate(310, 150)" opacity="0.12">
      <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" fill="none" stroke="#1A1816" stroke-width="0.5"/>
    </g>
    <!-- Bottom geometric -->
    <g transform="translate(80, 450)" opacity="0.1">
      <rect x="0" y="0" width="15" height="15" fill="none" stroke="#1A1816" stroke-width="0.5" transform="rotate(45, 7.5, 7.5)"/>
      <rect x="20" y="0" width="10" height="10" fill="none" stroke="#1A1816" stroke-width="0.3" transform="rotate(45, 25, 5)"/>
    </g>

    <!-- Chrome accent line top -->
    <rect x="80" y="160" width="240" height="1" fill="url(#chrome-h)" opacity="0.4"/>

    <!-- Geometric monogram frame -->
    <g transform="translate(200, 210)">
      <rect x="-30" y="-25" width="60" height="50" rx="2" fill="none" stroke="url(#chrome)" stroke-width="0.8" opacity="0.3"/>
      <rect x="-27" y="-22" width="54" height="44" rx="1" fill="none" stroke="url(#chrome)" stroke-width="0.4" opacity="0.2"/>
      <text x="0" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#1A1816" font-weight="600" letter-spacing="2" opacity="0.6">A D</text>
    </g>

    <!-- Names -->
    <text x="200" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="600" fill="#1A1816" letter-spacing="1">Анна</text>
    
    <!-- Metallic ampersand -->
    <text x="200" y="328" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="url(#chrome-h)" letter-spacing="3" filter="url(#metallic-glow)">&amp;</text>
    
    <text x="200" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="600" fill="#1A1816" letter-spacing="1">Дмитрий</text>

    <!-- Chrome divider -->
    <rect x="140" y="378" width="120" height="1" fill="url(#chrome-h)" opacity="0.3"/>

    <!-- Date -->
    <text x="200" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4A4640" letter-spacing="4">15 АВГУСТА 2026</text>

    <!-- Chrome accent line bottom -->
    <rect x="80" y="425" width="240" height="1" fill="url(#chrome-h)" opacity="0.4"/>

    <!-- Bottom right geometric accent -->
    <g transform="translate(315, 440)" opacity="0.12">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#1A1816" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="6" fill="none" stroke="#1A1816" stroke-width="0.3"/>
      <circle cx="0" cy="0" r="2" fill="#1A1816" opacity="0.3"/>
    </g>

    <!-- Black/white band at bottom of card -->
    <rect x="55" y="465" width="290" height="15" fill="#1A1816" opacity="0.04"/>
  </g>

  <!-- Phone side button -->
  <rect x="364" y="160" width="4" height="40" rx="2" fill="#2D2D2D"/>
  <rect x="364" y="210" width="4" height="40" rx="2" fill="#2D2D2D"/>

  <!-- Bottom home indicator -->
  <rect x="140" y="565" width="120" height="4" rx="2" fill="#1A1816" opacity="0.3"/>

  <!-- Template label -->
  <rect x="100" y="588" width="200" height="12" rx="6" fill="#1A1816" opacity="0.06"/>
  <text x="200" y="597" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4A4640" letter-spacing="1.5">MODERN LUXURY</text>
</svg>
