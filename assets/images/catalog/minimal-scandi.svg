<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <filter id="shadow" x="-10%" y="-5%" width="130%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1A1816" flood-opacity="0.08"/>
    </filter>
    <filter id="soft-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1A1816" flood-opacity="0.05"/>
    </filter>
    <linearGradient id="scandi-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDFBF9"/>
      <stop offset="100%" stop-color="#F5EDE3"/>
    </linearGradient>
    <clipPath id="phone-clip">
      <rect x="40" y="20" width="320" height="560" rx="36" ry="36"/>
    </clipPath>
  </defs>

  <!-- Phone body -->
  <rect x="36" y="16" width="328" height="568" rx="40" ry="40" fill="#E8E6E1" filter="url(#shadow)"/>
  <rect x="40" y="20" width="320" height="560" rx="36" ry="36" fill="url(#scandi-bg)"/>
  
  <!-- Notch -->
  <rect x="150" y="20" width="100" height="24" rx="12" ry="12" fill="#E8E6E1"/>
  <circle cx="185" cy="32" r="4" fill="#C5C0B6" opacity="0.5"/>
  <circle cx="200" cy="32" r="3" fill="#C5C0B6" opacity="0.3"/>

  <!-- Screen content -->
  <g clip-path="url(#phone-clip)">
    <!-- Clean white space - minimal -->
    
    <!-- Thin horizontal line accent -->
    <line x1="80" y1="80" x2="320" y2="80" stroke="#E0DDD6" stroke-width="0.5"/>

    <!-- Spruce branch - top right -->
    <g transform="translate(310, 60)" opacity="0.35">
      <!-- Main stem -->
      <line x1="0" y1="0" x2="-5" y2="60" stroke="#8A8578" stroke-width="1"/>
      <!-- Needles left -->
      <line x1="-1" y1="8" x2="-15" y2="4" stroke="#A09E8E" stroke-width="0.6"/>
      <line x1="-2" y1="14" x2="-18" y2="12" stroke="#A09E8E" stroke-width="0.6"/>
      <line x1="-2" y1="20" x2="-16" y2="18" stroke="#A09E8E" stroke-width="0.6"/>
      <line x1="-3" y1="26" x2="-17" y2="24" stroke="#A09E8E" stroke-width="0.6"/>
      <line x1="-3" y1="32" x2="-15" y2="30" stroke="#A09E8E" stroke-width="0.6"/>
      <line x1="-4" y1="38" x2="-14" y2="36" stroke="#A09E8E" stroke-width="0.6"/>
      <line x1="-4" y1="44" x2="-12" y2="42" stroke="#A09E8E" stroke-width="0.6"/>
      <!-- Needles right -->
      <line x1="-1" y1="10" x2="13" y2="6" stroke="#A09E8E" stroke-width="0.6"/>
      <line x1="-2" y1="16" x2="14" y2="14" stroke="#A09E8E" stroke-width="0.6"/>
      <line x1="-2" y1="22" x2="13" y2="20" stroke="#A09E8E" stroke-width="0.6"/>
      <line x1="-3" y1="28" x2="12" y2="26" stroke="#A09E8E" stroke-width="0.6"/>
      <line x1="-3" y1="34" x2="11" y2="32" stroke="#A09E8E" stroke-width="0.6"/>
      <line x1="-4" y1="40" x2="10" y2="38" stroke="#A09E8E" stroke-width="0.6"/>
      <line x1="-4" y1="46" x2="9" y2="44" stroke="#A09E8E" stroke-width="0.6"/>
    </g>

    <!-- Small spruce branch - bottom left -->
    <g transform="translate(90, 460) rotate(30)" opacity="0.25">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#8A8578" stroke-width="0.8"/>
      <line x1="0" y1="6" x2="-10" y2="3" stroke="#A09E8E" stroke-width="0.5"/>
      <line x1="0" y1="12" x2="-12" y2="9" stroke="#A09E8E" stroke-width="0.5"/>
      <line x1="0" y1="18" x2="-10" y2="15" stroke="#A09E8E" stroke-width="0.5"/>
      <line x1="0" y1="6" x2="10" y2="3" stroke="#A09E8E" stroke-width="0.5"/>
      <line x1="0" y1="12" x2="12" y2="9" stroke="#A09E8E" stroke-width="0.5"/>
      <line x1="0" y1="18" x2="10" y2="15" stroke="#A09E8E" stroke-width="0.5"/>
    </g>

    <!-- Invitation card - ultra minimal -->
    <rect x="80" y="120" width="240" height="340" rx="2" ry="2" fill="#FDFBF9" filter="url(#soft-shadow)"/>
    <!-- Subtle border -->
    <rect x="80" y="120" width="240" height="340" rx="2" ry="2" fill="none" stroke="#E0DDD6" stroke-width="0.5"/>

    <!-- Minimal dot accent -->
    <circle cx="200" cy="155" r="3" fill="#C5C0B6" opacity="0.3"/>

    <!-- Names - clean and minimal -->
    <text x="200" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="400" fill="#4A4640" letter-spacing="1">Анна</text>
    <text x="200" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8A8578" letter-spacing="4">&amp;</text>
    <text x="200" y="275" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="400" fill="#4A4640" letter-spacing="1">Дмитрий</text>

    <!-- Minimal divider - single thin line -->
    <line x1="160" y1="295" x2="240" y2="295" stroke="#E0DDD6" stroke-width="0.5"/>

    <!-- Date -->
    <text x="200" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8A8578" letter-spacing="3">15 АВГУСТА 2026</text>

    <!-- Minimal bottom dots -->
    <g transform="translate(200, 365)" opacity="0.2">
      <circle cx="-12" cy="0" r="1" fill="#8A8578"/>
      <circle cx="0" cy="0" r="1.5" fill="#8A8578"/>
      <circle cx="12" cy="0" r="1" fill="#8A8578"/>
    </g>

    <!-- Venue hint -->
    <text x="200" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#C5C0B6" letter-spacing="2">МОСКВА</text>

    <!-- Thin horizontal line -->
    <line x1="80" y1="500" x2="320" y2="500" stroke="#E0DDD6" stroke-width="0.5"/>
  </g>

  <!-- Phone side button -->
  <rect x="364" y="160" width="4" height="40" rx="2" fill="#D0CEC9"/>
  <rect x="364" y="210" width="4" height="40" rx="2" fill="#D0CEC9"/>

  <!-- Bottom home indicator -->
  <rect x="140" y="565" width="120" height="4" rx="2" fill="#C5C0B6" opacity="0.3"/>

  <!-- Template label -->
  <rect x="105" y="588" width="190" height="12" rx="6" fill="#E0DDD6" opacity="0.3"/>
  <text x="200" y="597" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8A8578" letter-spacing="1.5">MINIMAL SCANDI</text>
</svg>
