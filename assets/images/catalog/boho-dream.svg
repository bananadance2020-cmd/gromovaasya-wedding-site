<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <filter id="shadow" x="-10%" y="-5%" width="130%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1A1816" flood-opacity="0.12"/>
    </filter>
    <filter id="soft-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1A1816" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="terracotta-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C4A0"/>
      <stop offset="40%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#C48B5A"/>
    </linearGradient>
    <linearGradient id="dreamcatcher-gold" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#DCC59A"/>
      <stop offset="50%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#9E7D3E"/>
    </linearGradient>
    <linearGradient id="feather-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5EDE3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#DCCBB7" stop-opacity="0.6"/>
    </linearGradient>
    <pattern id="macrame" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M0,10 Q5,0 10,10 Q15,20 20,10" fill="none" stroke="#DCC59A" stroke-width="0.5" opacity="0.3"/>
      <path d="M0,0 Q10,5 20,0" fill="none" stroke="#C9A96E" stroke-width="0.3" opacity="0.2"/>
    </pattern>
    <clipPath id="phone-clip">
      <rect x="40" y="20" width="320" height="560" rx="36" ry="36"/>
    </clipPath>
    <linearGradient id="screen-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EDE3"/>
      <stop offset="30%" stop-color="#FAF6F0"/>
      <stop offset="100%" stop-color="#F5EDE3"/>
    </linearGradient>
  </defs>

  <!-- Phone body -->
  <rect x="36" y="16" width="328" height="568" rx="40" ry="40" fill="#2D2D2D" filter="url(#shadow)"/>
  <rect x="40" y="20" width="320" height="560" rx="36" ry="36" fill="url(#screen-bg)"/>
  
  <!-- Notch -->
  <rect x="150" y="20" width="100" height="24" rx="12" ry="12" fill="#2D2D2D"/>
  <circle cx="185" cy="32" r="4" fill="#1A1816" opacity="0.5"/>
  <circle cx="200" cy="32" r="3" fill="#1A1816" opacity="0.3"/>

  <!-- Screen content (clipped) -->
  <g clip-path="url(#phone-clip)">
    <!-- Macrame pattern background -->
    <rect x="40" y="44" width="320" height="536" fill="url(#macrame)" opacity="0.5"/>
    
    <!-- Terracotta header band -->
    <rect x="40" y="44" width="320" height="180" fill="url(#terracotta-bg)" opacity="0.15"/>
    
    <!-- Dreamcatcher - top center -->
    <g transform="translate(200, 130)">
      <!-- Outer ring -->
      <circle cx="0" cy="0" r="50" fill="none" stroke="url(#dreamcatcher-gold)" stroke-width="2"/>
      <!-- Inner web -->
      <path d="M0,-50 L25,-25 L50,0 L25,25 L0,50 L-25,25 L-50,0 L-25,-25 Z" fill="none" stroke="#C9A96E" stroke-width="0.8" opacity="0.5"/>
      <path d="M0,-35 L18,-18 L35,0 L18,18 L0,35 L-18,18 L-35,0 L-18,-18 Z" fill="none" stroke="#DCC59A" stroke-width="0.6" opacity="0.4"/>
      <circle cx="0" cy="0" r="8" fill="none" stroke="#C9A96E" stroke-width="1"/>
      <circle cx="0" cy="0" r="3" fill="#DCC59A" opacity="0.6"/>
      <!-- Feathers hanging -->
      <g transform="translate(-20, 48)">
        <path d="M0,0 Q-8,15 -3,30 Q2,15 0,0" fill="url(#feather-grad)" stroke="#C9A96E" stroke-width="0.5"/>
        <line x1="0" y1="-2" x2="0" y2="0" stroke="#C9A96E" stroke-width="0.5"/>
      </g>
      <g transform="translate(0, 50)">
        <path d="M0,0 Q-6,18 -2,35 Q2,18 0,0" fill="url(#feather-grad)" stroke="#C9A96E" stroke-width="0.5"/>
        <line x1="0" y1="-2" x2="0" y2="0" stroke="#C9A96E" stroke-width="0.5"/>
      </g>
      <g transform="translate(20, 48)">
        <path d="M0,0 Q8,15 3,30 Q-2,15 0,0" fill="url(#feather-grad)" stroke="#C9A96E" stroke-width="0.5"/>
        <line x1="0" y1="-2" x2="0" y2="0" stroke="#C9A96E" stroke-width="0.5"/>
      </g>
      <!-- Beads -->
      <circle cx="-15" cy="20" r="2" fill="#DCC59A" opacity="0.7"/>
      <circle cx="12" cy="-25" r="1.5" fill="#C9A96E" opacity="0.6"/>
      <circle cx="25" cy="10" r="2" fill="#DCC59A" opacity="0.5"/>
    </g>

    <!-- Decorative feather left -->
    <g transform="translate(75, 220) rotate(-15)">
      <path d="M0,0 Q-12,20 -8,50 Q-4,70 0,80 Q4,70 8,50 Q12,20 0,0" fill="none" stroke="#C9A96E" stroke-width="1.2" opacity="0.6"/>
      <path d="M0,0 Q-8,25 -5,50 Q-2,65 0,75" fill="none" stroke="#DCC59A" stroke-width="0.5" opacity="0.4"/>
      <path d="M0,0 Q8,25 5,50 Q2,65 0,75" fill="none" stroke="#DCC59A" stroke-width="0.5" opacity="0.4"/>
    </g>

    <!-- Decorative feather right -->
    <g transform="translate(325, 210) rotate(20)">
      <path d="M0,0 Q10,18 7,45 Q4,60 0,70 Q-4,60 -7,45 Q-10,18 0,0" fill="none" stroke="#C9A96E" stroke-width="1.2" opacity="0.6"/>
      <path d="M0,0 Q6,22 4,45 Q2,58 0,68" fill="none" stroke="#DCC59A" stroke-width="0.5" opacity="0.4"/>
      <path d="M0,0 Q-6,22 -4,45 Q-2,58 0,68" fill="none" stroke="#DCC59A" stroke-width="0.5" opacity="0.4"/>
    </g>

    <!-- Invitation card -->
    <rect x="70" y="240" width="260" height="280" rx="8" ry="8" fill="#FDFBF9" filter="url(#soft-shadow)" opacity="0.95"/>
    <rect x="72" y="242" width="256" height="276" rx="7" ry="7" fill="none" stroke="#C9A96E" stroke-width="0.5" opacity="0.4"/>

    <!-- Terracotta accent line -->
    <rect x="120" y="260" width="160" height="1.5" fill="#D4A574" opacity="0.5"/>

    <!-- Names -->
    <text x="200" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="600" fill="#8B5E3C" font-style="italic">Анна</text>
    <text x="200" y="325" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#C9A96E" letter-spacing="3">&amp;</text>
    <text x="200" y="355" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="600" fill="#8B5E3C" font-style="italic">Дмитрий</text>

    <!-- Decorative divider -->
    <g transform="translate(200, 375)">
      <line x1="-40" y1="0" x2="-10" y2="0" stroke="#C9A96E" stroke-width="0.5" opacity="0.6"/>
      <circle cx="0" cy="0" r="2" fill="none" stroke="#C9A96E" stroke-width="0.8" opacity="0.6"/>
      <line x1="10" y1="0" x2="40" y2="0" stroke="#C9A96E" stroke-width="0.5" opacity="0.6"/>
    </g>

    <!-- Date -->
    <text x="200" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#8A8578" letter-spacing="2">15 АВГУСТА 2026</text>

    <!-- Bottom decorative element -->
    <g transform="translate(200, 440)">
      <path d="M-30,0 Q-15,-8 0,0 Q15,8 30,0" fill="none" stroke="#D4A574" stroke-width="0.8" opacity="0.4"/>
      <circle cx="-20" cy="-3" r="1" fill="#C9A96E" opacity="0.3"/>
      <circle cx="20" cy="-3" r="1" fill="#C9A96E" opacity="0.3"/>
    </g>

    <!-- Small macrame knots at bottom corners -->
    <g transform="translate(90, 490)" opacity="0.3">
      <path d="M0,0 Q5,-5 10,0 Q5,5 0,0" fill="none" stroke="#C9A96E" stroke-width="0.5"/>
      <path d="M0,5 Q5,0 10,5" fill="none" stroke="#C9A96E" stroke-width="0.5"/>
    </g>
    <g transform="translate(300, 490)" opacity="0.3">
      <path d="M0,0 Q5,-5 10,0 Q5,5 0,0" fill="none" stroke="#C9A96E" stroke-width="0.5"/>
      <path d="M0,5 Q5,0 10,5" fill="none" stroke="#C9A96E" stroke-width="0.5"/>
    </g>
  </g>

  <!-- Phone side button -->
  <rect x="364" y="160" width="4" height="40" rx="2" fill="#3D3D3D"/>
  <rect x="364" y="210" width="4" height="40" rx="2" fill="#3D3D3D"/>

  <!-- Bottom home indicator -->
  <rect x="140" y="565" width="120" height="4" rx="2" fill="#1A1816" opacity="0.3"/>

  <!-- Template label -->
  <rect x="120" y="588" width="160" height="12" rx="6" fill="#D4A574" opacity="0.15"/>
  <text x="200" y="597" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8B5E3C" letter-spacing="1.5">BOHO DREAM</text>
</svg>
