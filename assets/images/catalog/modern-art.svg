<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <filter id="shadow" x="-10%" y="-5%" width="130%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1A1816" flood-opacity="0.12"/>
    </filter>
    <filter id="soft-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1A1816" flood-opacity="0.08"/>
    </filter>
    <filter id="blur-art">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <linearGradient id="screen-bg-art" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAF8"/>
      <stop offset="100%" stop-color="#F0EEE9"/>
    </linearGradient>
    <linearGradient id="paint-stroke1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ECDC0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4A9E91" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="paint-stroke2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9E7D3E" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="paint-stroke3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#C25B5B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E89B9B" stop-opacity="0.2"/>
    </linearGradient>
    <clipPath id="phone-clip">
      <rect x="40" y="20" width="320" height="560" rx="36" ry="36"/>
    </clipPath>
  </defs>

  <!-- Phone body -->
  <rect x="36" y="16" width="328" height="568" rx="40" ry="40" fill="#2D2D2D" filter="url(#shadow)"/>
  <rect x="40" y="20" width="320" height="560" rx="36" ry="36" fill="url(#screen-bg-art)"/>
  
  <!-- Notch -->
  <rect x="150" y="20" width="100" height="24" rx="12" ry="12" fill="#2D2D2D"/>
  <circle cx="185" cy="32" r="4" fill="#1A1816" opacity="0.5"/>
  <circle cx="200" cy="32" r="3" fill="#1A1816" opacity="0.3"/>

  <!-- Screen content -->
  <g clip-path="url(#phone-clip)">
    <!-- Abstract paint strokes background -->
    <g opacity="0.5" filter="url(#blur-art)">
      <ellipse cx="100" cy="120" rx="80" ry="50" fill="url(#paint-stroke1)" transform="rotate(-20, 100, 120)"/>
      <ellipse cx="280" cy="100" rx="70" ry="40" fill="url(#paint-stroke2)" transform="rotate(15, 280, 100)"/>
      <ellipse cx="180" cy="200" rx="90" ry="30" fill="url(#paint-stroke3)" transform="rotate(-5, 180, 200)"/>
    </g>

    <!-- Bold abstract shapes -->
    <circle cx="80" cy="90" r="25" fill="#7ECDC0" opacity="0.15"/>
    <circle cx="310" cy="140" r="35" fill="#C9A96E" opacity="0.1"/>
    <rect x="260" y="70" width="40" height="40" rx="5" fill="#C25B5B" opacity="0.08" transform="rotate(45, 280, 90)"/>
    
    <!-- Gallery-style frame lines -->
    <rect x="60" y="65" width="280" height="2" fill="#1A1816" opacity="0.06"/>
    <rect x="60" y="65" width="2" height="180" fill="#1A1816" opacity="0.06"/>

    <!-- Abstract brush strokes -->
    <path d="M60,170 Q100,140 150,165 Q200,190 250,155 Q300,120 340,160" fill="none" stroke="#7ECDC0" stroke-width="3" opacity="0.25" stroke-linecap="round"/>
    <path d="M50,190 Q90,175 130,195 Q170,215 220,180 Q270,145 330,185" fill="none" stroke="#C9A96E" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
    <path d="M70,180 Q110,195 160,170 Q210,145 260,175 Q310,205 350,175" fill="none" stroke="#C25B5B" stroke-width="2.5" opacity="0.15" stroke-linecap="round"/>

    <!-- Invitation card -->
    <rect x="55" y="240" width="290" height="280" rx="4" ry="4" fill="#FAFAF8" filter="url(#soft-shadow)" opacity="0.95"/>
    <!-- Bold accent line left border -->
    <rect x="55" y="240" width="4" height="280" rx="2" fill="#7ECDC0" opacity="0.6"/>

    <!-- Abstract art element inside card -->
    <g transform="translate(200, 280)">
      <circle cx="-30" cy="-10" r="18" fill="#7ECDC0" opacity="0.2"/>
      <circle cx="20" cy="-15" r="12" fill="#C9A96E" opacity="0.2"/>
      <circle cx="-5" cy="10" r="22" fill="#C25B5B" opacity="0.1"/>
      <rect x="-25" y="-5" width="50" height="2" fill="#1A1816" opacity="0.08" transform="rotate(-10)"/>
    </g>

    <!-- Names in bold modern style -->
    <text x="200" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#1A1816">АННА</text>
    <text x="200" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7ECDC0" letter-spacing="6" font-weight="500">&amp;</text>
    <text x="200" y="395" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#1A1816">ДМИТРИЙ</text>

    <!-- Modern divider -->
    <rect x="150" y="410" width="100" height="2" fill="#1A1816" opacity="0.15"/>

    <!-- Date -->
    <text x="200" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4A4640" letter-spacing="3">15 АВГУСТА 2026</text>

    <!-- Gallery-style corner marks -->
    <path d="M70,260 L70,255 L75,255" fill="none" stroke="#8A8578" stroke-width="0.8" opacity="0.3"/>
    <path d="M330,260 L330,255 L325,255" fill="none" stroke="#8A8578" stroke-width="0.8" opacity="0.3"/>
    <path d="M70,500 L70,505 L75,505" fill="none" stroke="#8A8578" stroke-width="0.8" opacity="0.3"/>
    <path d="M330,500 L330,505 L325,505" fill="none" stroke="#8A8578" stroke-width="0.8" opacity="0.3"/>

    <!-- Bold color block accent bottom right -->
    <rect x="280" y="470" width="50" height="30" rx="2" fill="#7ECDC0" opacity="0.15"/>
    <rect x="285" y="475" width="20" height="20" rx="1" fill="#C9A96E" opacity="0.15"/>
  </g>

  <!-- Phone side button -->
  <rect x="364" y="160" width="4" height="40" rx="2" fill="#3D3D3D"/>
  <rect x="364" y="210" width="4" height="40" rx="2" fill="#3D3D3D"/>

  <!-- Bottom home indicator -->
  <rect x="140" y="565" width="120" height="4" rx="2" fill="#1A1816" opacity="0.3"/>

  <!-- Template label -->
  <rect x="110" y="588" width="180" height="12" rx="6" fill="#7ECDC0" opacity="0.15"/>
  <text x="200" y="597" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4A9E91" letter-spacing="1.5">MODERN ART</text>
</svg>
