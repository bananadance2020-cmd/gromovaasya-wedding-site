<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <filter id="shadow" x="-10%" y="-5%" width="130%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1A1816" flood-opacity="0.12"/>
    </filter>
    <filter id="soft-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1A1816" flood-opacity="0.08"/>
    </filter>
    <filter id="paper-texture">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply"/>
    </filter>
    <linearGradient id="kraft-bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#C4A882"/>
      <stop offset="50%" stop-color="#B89B72"/>
      <stop offset="100%" stop-color="#A88B65"/>
    </linearGradient>
    <linearGradient id="kraft-light" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#D4C4A8"/>
      <stop offset="100%" stop-color="#C8B898"/>
    </linearGradient>
    <linearGradient id="screen-rustic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EDE3"/>
      <stop offset="100%" stop-color="#EDE0D2"/>
    </linearGradient>
    <clipPath id="phone-clip">
      <rect x="40" y="20" width="320" height="560" rx="36" ry="36"/>
    </clipPath>
    <pattern id="crosshatch" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="12" y2="12" stroke="#8B7355" stroke-width="0.3" opacity="0.08"/>
      <line x1="12" y1="0" x2="0" y2="12" stroke="#8B7355" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Phone body -->
  <rect x="36" y="16" width="328" height="568" rx="40" ry="40" fill="#6B5B4A" filter="url(#shadow)"/>
  <rect x="40" y="20" width="320" height="560" rx="36" ry="36" fill="url(#screen-rustic)"/>
  
  <!-- Notch -->
  <rect x="150" y="20" width="100" height="24" rx="12" ry="12" fill="#6B5B4A"/>
  <circle cx="185" cy="32" r="4" fill="#4A4640" opacity="0.5"/>
  <circle cx="200" cy="32" r="3" fill="#4A4640" opacity="0.3"/>

  <!-- Screen content -->
  <g clip-path="url(#phone-clip)">
    <!-- Crosshatch texture -->
    <rect x="40" y="44" width="320" height="536" fill="url(#crosshatch)"/>

    <!-- Kraft paper header band -->
    <rect x="40" y="44" width="320" height="160" fill="url(#kraft-bg)" opacity="0.2"/>

    <!-- Wildflowers - top left cluster -->
    <g transform="translate(85, 70)" opacity="0.5">
      <!-- Stem 1 - lavender -->
      <line x1="0" y1="30" x2="-5" y2="0" stroke="#7B8B5E" stroke-width="1"/>
      <ellipse cx="-6" cy="5" rx="3" ry="5" fill="#9B8BB4" opacity="0.6"/>
      <ellipse cx="-4" cy="12" rx="2.5" ry="4" fill="#9B8BB4" opacity="0.5"/>
      <ellipse cx="-7" cy="18" rx="2" ry="3.5" fill="#9B8BB4" opacity="0.4"/>
      <!-- Stem 2 - chamomile -->
      <line x1="15" y1="35" x2="18" y2="5" stroke="#7B8B5E" stroke-width="0.8"/>
      <circle cx="18" cy="5" r="5" fill="none" stroke="#F5EDE3" stroke-width="0.8" opacity="0.7"/>
      <circle cx="18" cy="5" r="2" fill="#DCC59A" opacity="0.6"/>
      <!-- Stem 3 - cornflower -->
      <line x1="30" y1="28" x2="35" y2="0" stroke="#7B8B5E" stroke-width="0.8"/>
      <circle cx="35" cy="0" r="4" fill="#5B8FC2" opacity="0.4"/>
      <circle cx="35" cy="0" r="1.5" fill="#F5EDE3" opacity="0.5"/>
    </g>

    <!-- Wildflowers - top right cluster -->
    <g transform="translate(290, 60)" opacity="0.5">
      <!-- Wheat stalks -->
      <line x1="0" y1="40" x2="-3" y2="0" stroke="#A89070" stroke-width="1"/>
      <ellipse cx="-4" cy="3" rx="3" ry="5" fill="#C8B898" opacity="0.6" transform="rotate(-15, -4, 3)"/>
      <ellipse cx="-2" cy="10" rx="3" ry="5" fill="#C8B898" opacity="0.5" transform="rotate(10, -2, 10)"/>
      <ellipse cx="-5" cy="17" rx="2.5" ry="4" fill="#C8B898" opacity="0.4" transform="rotate(-10, -5, 17)"/>
      <!-- Poppy -->
      <line x1="-15" y1="35" x2="-20" y2="8" stroke="#7B8B5E" stroke-width="0.8"/>
      <circle cx="-20" cy="8" r="5" fill="#C25B5B" opacity="0.35"/>
      <circle cx="-20" cy="8" r="1.5" fill="#1A1816" opacity="0.3"/>
    </g>

    <!-- Invitation card - kraft paper look -->
    <rect x="60" y="170" width="280" height="330" rx="3" ry="3" fill="url(#kraft-light)" filter="url(#soft-shadow)"/>
    <!-- Kraft paper edge roughness -->
    <rect x="60" y="170" width="280" height="330" rx="3" ry="3" fill="none" stroke="#A88B65" stroke-width="0.8" opacity="0.4"/>
    <!-- Crosshatch on card -->
    <rect x="62" y="172" width="276" height="326" rx="2" ry="2" fill="url(#crosshatch)" opacity="0.3"/>

    <!-- Twine/string decoration across top of card -->
    <path d="M80,185 Q120,178 160,185 Q200,192 240,185 Q280,178 320,185" fill="none" stroke="#A88B65" stroke-width="1.5" opacity="0.4"/>
    <!-- Small bow -->
    <g transform="translate(200, 182)">
      <path d="M-8,0 Q-12,-6 -6,-8 Q-2,-4 0,0" fill="none" stroke="#A88B65" stroke-width="0.8" opacity="0.5"/>
      <path d="M8,0 Q12,-6 6,-8 Q2,-4 0,0" fill="none" stroke="#A88B65" stroke-width="0.8" opacity="0.5"/>
      <circle cx="0" cy="0" r="1.5" fill="#A88B65" opacity="0.4"/>
    </g>

    <!-- Wildflower stamp-like element -->
    <g transform="translate(100, 210)" opacity="0.35">
      <circle cx="0" cy="0" r="12" fill="none" stroke="#7B8B5E" stroke-width="0.5"/>
      <line x1="0" y1="5" x2="0" y2="12" stroke="#7B8B5E" stroke-width="0.5"/>
      <circle cx="0" cy="-2" r="3" fill="#C25B5B" opacity="0.4"/>
    </g>

    <!-- Names in rustic style -->
    <text x="200" y="270" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="600" fill="#6B5B4A">Анна</text>
    <text x="200" y="295" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#8B7355" letter-spacing="3">&amp;</text>
    <text x="200" y="325" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="600" fill="#6B5B4A">Дмитрий</text>

    <!-- Rustic divider - leaf pattern -->
    <g transform="translate(200, 345)" opacity="0.4">
      <line x1="-50" y1="0" x2="-8" y2="0" stroke="#7B8B5E" stroke-width="0.5"/>
      <path d="M-5,-3 Q0,-6 5,-3 Q0,0 -5,-3" fill="#7B8B5E" opacity="0.5"/>
      <line x1="8" y1="0" x2="50" y2="0" stroke="#7B8B5E" stroke-width="0.5"/>
    </g>

    <!-- Date -->
    <text x="200" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8A8578" letter-spacing="2">15 АВГУСТА 2026</text>

    <!-- Bottom wildflower cluster -->
    <g transform="translate(200, 430)" opacity="0.3">
      <line x1="0" y1="0" x2="-15" y2="-15" stroke="#7B8B5E" stroke-width="0.5"/>
      <circle cx="-16" cy="-16" r="3" fill="#9B8BB4" opacity="0.5"/>
      <line x1="0" y1="0" x2="10" y2="-18" stroke="#7B8B5E" stroke-width="0.5"/>
      <circle cx="11" cy="-19" r="2.5" fill="#C25B5B" opacity="0.4"/>
      <line x1="0" y1="0" x2="0" y2="-20" stroke="#7B8B5E" stroke-width="0.5"/>
      <circle cx="0" cy="-22" r="3" fill="#F5EDE3" stroke="#DCC59A" stroke-width="0.5" opacity="0.5"/>
    </g>

    <!-- Kraft stamp effect bottom right -->
    <g transform="translate(300, 460)" opacity="0.2">
      <rect x="-15" y="-10" width="30" height="20" rx="2" fill="none" stroke="#8B7355" stroke-width="0.8"/>
      <text x="0" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" fill="#8B7355" letter-spacing="1">LOVE</text>
    </g>
  </g>

  <!-- Phone side button -->
  <rect x="364" y="160" width="4" height="40" rx="2" fill="#5A4D3E"/>
  <rect x="364" y="210" width="4" height="40" rx="2" fill="#5A4D3E"/>

  <!-- Bottom home indicator -->
  <rect x="140" y="565" width="120" height="4" rx="2" fill="#6B5B4A" opacity="0.3"/>

  <!-- Template label -->
  <rect x="105" y="588" width="190" height="12" rx="6" fill="#A88B65" opacity="0.2"/>
  <text x="200" y="597" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6B5B4A" letter-spacing="1.5">BOHO RUSTIC</text>
</svg>
