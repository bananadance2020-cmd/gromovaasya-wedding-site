<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <filter id="card-shadow" x="-10%" y="-5%" width="130%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="4" flood-color="#1A1816" flood-opacity="0.06"/>
    </filter>
    <filter id="phone-shadow" x="-10%" y="-5%" width="130%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1A1816" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background - ultra clean -->
  <rect width="400" height="600" fill="#FAFAF8"/>

  <!-- Phone mockup silhouette -->
  <g filter="url(#phone-shadow)">
    <rect x="55" y="30" width="290" height="540" rx="35" ry="35" fill="#1A1816"/>
    <rect x="60" y="38" width="280" height="524" rx="30" ry="30" fill="#FFFFFF"/>
    <rect x="165" y="38" width="70" height="14" rx="7" ry="7" fill="#1A1816"/>
    <rect x="62" y="54" width="276" height="506" rx="0" ry="0" fill="#FFFFFF"/>
  </g>

  <!-- Invitation card inside phone -->
  <g transform="translate(82, 75) rotate(-0.5) scale(0.96)" filter="url(#card-shadow)">
    <!-- Card background - pure white, no border -->
    <rect x="0" y="0" width="240" height="460" rx="1" ry="1" fill="#FFFFFF"/>

    <!-- ULTRA MINIMAL — only thin lines and text -->

    <!-- Single thin horizontal line -->
    <line x1="40" y1="140" x2="200" y2="140" stroke="#E0DDD6" stroke-width="0.5"/>

    <!-- Lots of negative space -->

    <!-- Names - clean serif, regular weight -->
    <text x="120" y="200" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="26" fill="#2D2A26" font-weight="400">Анна</text>

    <!-- Minimal ampersand -->
    <text x="120" y="222" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="12" fill="#C5C0B6" font-weight="400">&amp;</text>

    <text x="120" y="252" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="26" fill="#2D2A26" font-weight="400">Дмитрий</text>

    <!-- Second thin horizontal line -->
    <line x1="60" y1="275" x2="180" y2="275" stroke="#E0DDD6" stroke-width="0.5"/>

    <!-- Date - small, light -->
    <text x="120" y="310" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" fill="#8A8578" letter-spacing="0.12em" font-weight="400">15.08.2026</text>

    <!-- Nothing else — maximum negative space below -->
  </g>

  <!-- Phone home indicator -->
  <rect x="170" y="550" width="60" height="4" rx="2" fill="#1A1816" opacity="0.3"/>
</svg>
