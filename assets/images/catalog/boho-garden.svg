<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <filter id="card-shadow" x="-10%" y="-5%" width="130%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#1A1816" flood-opacity="0.12"/>
    </filter>
    <filter id="phone-shadow" x="-10%" y="-5%" width="130%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1A1816" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="leaf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B9E78"/>
      <stop offset="100%" stop-color="#4A8058"/>
    </linearGradient>
    <!-- Botanical leaf shape -->
    <g id="leaf">
      <path d="M0,0 Q8,-12 20,-8 Q12,-2 0,0Z" fill="url(#leaf-grad)" opacity="0.7"/>
      <path d="M0,0 Q10,-10 18,-6" fill="none" stroke="#6B9E78" stroke-width="0.3" opacity="0.5"/>
    </g>
    <!-- Small flower -->
    <g id="small-flower">
      <circle cx="0" cy="-4" r="3" fill="#DCC59A" opacity="0.8"/>
      <circle cx="3.5" cy="-1.5" r="3" fill="#DCC59A" opacity="0.7"/>
      <circle cx="2" cy="2.5" r="3" fill="#DCC59A" opacity="0.6"/>
      <circle cx="-2" cy="2.5" r="3" fill="#DCC59A" opacity="0.7"/>
      <circle cx="-3.5" cy="-1.5" r="3" fill="#DCC59A" opacity="0.6"/>
      <circle cx="0" cy="0" r="1.5" fill="#C9A96E"/>
    </g>
    <!-- Eucalyptus branch -->
    <g id="eucalyptus">
      <path d="M0,0 Q5,-15 3,-30 Q1,-45 5,-60" fill="none" stroke="#6B9E78" stroke-width="0.8"/>
      <ellipse cx="8" cy="-8" rx="4" ry="2.5" fill="#6B9E78" opacity="0.6" transform="rotate(30,8,-8)"/>
      <ellipse cx="-5" cy="-16" rx="4" ry="2.5" fill="#6B9E78" opacity="0.5" transform="rotate(-25,-5,-16)"/>
      <ellipse cx="7" cy="-24" rx="3.5" ry="2" fill="#6B9E78" opacity="0.55" transform="rotate(20,7,-24)"/>
      <ellipse cx="-4" cy="-32" rx="3.5" ry="2" fill="#6B9E78" opacity="0.5" transform="rotate(-30,-4,-32)"/>
      <ellipse cx="6" cy="-40" rx="3" ry="1.8" fill="#6B9E78" opacity="0.45" transform="rotate(25,6,-40)"/>
      <ellipse cx="-3" cy="-48" rx="3" ry="1.8" fill="#6B9E78" opacity="0.4" transform="rotate(-20,-3,-48)"/>
      <ellipse cx="4" cy="-56" rx="2.5" ry="1.5" fill="#6B9E78" opacity="0.35" transform="rotate(15,4,-56)"/>
    </g>
  </defs>

  <!-- Background - warm beige-green -->
  <rect width="400" height="600" fill="#E8F2EB"/>

  <!-- Phone mockup silhouette -->
  <g filter="url(#phone-shadow)">
    <rect x="55" y="30" width="290" height="540" rx="35" ry="35" fill="#2D2A26"/>
    <rect x="60" y="38" width="280" height="524" rx="30" ry="30" fill="#FAFAF8"/>
    <rect x="165" y="38" width="70" height="14" rx="7" ry="7" fill="#2D2A26"/>
    <rect x="62" y="54" width="276" height="506" rx="0" ry="0" fill="#F5EDE3"/>
  </g>

  <!-- Invitation card inside phone -->
  <g transform="translate(82, 75) rotate(-1.2) scale(0.96)" filter="url(#card-shadow)">
    <!-- Card background - warm beige -->
    <rect x="0" y="0" width="240" height="460" rx="4" ry="4" fill="#FDFBF9"/>

    <!-- Botanical wreath - top left eucalyptus -->
    <use href="#eucalyptus" x="45" y="110" transform="rotate(40,45,110) scale(0.8)"/>
    <!-- Top right eucalyptus -->
    <use href="#eucalyptus" x="195" y="110" transform="rotate(-40,195,110) scale(0.8)"/>
    <!-- Bottom left eucalyptus -->
    <use href="#eucalyptus" x="45" y="370" transform="rotate(140,45,370) scale(0.7)"/>
    <!-- Bottom right eucalyptus -->
    <use href="#eucalyptus" x="195" y="370" transform="rotate(-140,195,370) scale(0.7)"/>

    <!-- Small scattered leaves -->
    <use href="#leaf" x="30" y="80" transform="rotate(15,30,80) scale(0.6)"/>
    <use href="#leaf" x="200" y="90" transform="rotate(-20,200,90) scale(0.5)"/>
    <use href="#leaf" x="35" y="400" transform="rotate(-15,35,400) scale(0.5)"/>
    <use href="#leaf" x="195" y="395" transform="rotate(25,195,395) scale(0.55)"/>

    <!-- Small flowers -->
    <use href="#small-flower" x="50" y="130" transform="scale(0.7)"/>
    <use href="#small-flower" x="190" y="125" transform="scale(0.6)"/>
    <use href="#small-flower" x="120" y="75" transform="scale(0.5)"/>

    <!-- "Приглашение" -->
    <text x="120" y="165" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="11" fill="#6B9E78" letter-spacing="0.2em" font-weight="400">ПРИГЛАШЕНИЕ</text>

    <!-- Thin decorative line with leaf -->
    <line x1="65" y1="178" x2="105" y2="178" stroke="#6B9E78" stroke-width="0.5" opacity="0.6"/>
    <use href="#leaf" x="115" y="178" transform="rotate(-90,115,178) scale(0.3)"/>
    <line x1="130" y1="178" x2="175" y2="178" stroke="#6B9E78" stroke-width="0.5" opacity="0.6"/>

    <!-- Names -->
    <text x="120" y="220" text-anchor="middle" font-family="'Great Vibes', 'Brush Script MT', cursive" font-size="32" fill="#2D2A26">Анна</text>
    <text x="120" y="242" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="16" fill="#6B9E78">&amp;</text>
    <text x="120" y="280" text-anchor="middle" font-family="'Great Vibes', 'Brush Script MT', cursive" font-size="32" fill="#2D2A26">Дмитрий</text>

    <!-- Decorative line -->
    <line x1="60" y1="298" x2="180" y2="298" stroke="#C9A96E" stroke-width="0.5" opacity="0.6"/>

    <!-- Date -->
    <text x="120" y="325" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="12" fill="#4A4640" letter-spacing="0.08em">15 августа 2026</text>

    <!-- Time -->
    <text x="120" y="345" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="9" fill="#8A8578">в 16:00</text>

    <!-- Venue -->
    <text x="120" y="370" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="8" fill="#A8A296">Усадьба «Лесная поляна»</text>

    <!-- Bottom small flower accent -->
    <use href="#small-flower" x="120" y="415" transform="scale(0.4)"/>
  </g>

  <!-- Phone home indicator -->
  <rect x="170" y="550" width="60" height="4" rx="2" fill="#1A1816" opacity="0.3"/>
</svg>
