<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <filter id="card-shadow" x="-10%" y="-5%" width="130%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#1A1816" flood-opacity="0.12"/>
    </filter>
    <filter id="phone-shadow" x="-10%" y="-5%" width="130%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1A1816" flood-opacity="0.2"/>
    </filter>
    <!-- Aged paper gradient -->
    <linearGradient id="vintage-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE0D2"/>
      <stop offset="50%" stop-color="#F5EDE3"/>
      <stop offset="100%" stop-color="#E8D8BE"/>
    </linearGradient>
    <!-- Vintage border gradient -->
    <linearGradient id="vintage-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B59255"/>
      <stop offset="100%" stop-color="#9E7D3E"/>
    </linearGradient>
    <!-- Decorative vintage corner -->
    <g id="vintage-corner">
      <path d="M0,0 L50,0 L50,5 L5,5 L5,50 L0,50Z" fill="none" stroke="#B59255" stroke-width="1"/>
      <path d="M10,0 L10,10 L0,10" fill="none" stroke="#B59255" stroke-width="0.7"/>
      <path d="M20,0 L20,20 L0,20" fill="none" stroke="#B59255" stroke-width="0.5"/>
      <circle cx="15" cy="15" r="2" fill="none" stroke="#B59255" stroke-width="0.5"/>
      <!-- Ornamental curl -->
      <path d="M8,25 Q15,20 20,28 Q25,35 18,32 Q12,28 8,25Z" fill="none" stroke="#B59255" stroke-width="0.6"/>
      <path d="M25,8 Q20,15 28,20 Q35,25 32,18 Q28,12 25,8Z" fill="none" stroke="#B59255" stroke-width="0.6"/>
    </g>
    <!-- Vintage flourish -->
    <g id="vintage-flourish">
      <path d="M0,10 Q10,0 25,10 Q40,20 55,10 Q70,0 80,10" fill="none" stroke="#B59255" stroke-width="0.8"/>
      <path d="M0,10 Q10,20 25,10 Q40,0 55,10 Q70,20 80,10" fill="none" stroke="#B59255" stroke-width="0.5"/>
      <circle cx="40" cy="10" r="2.5" fill="#C9A96E" opacity="0.6"/>
      <!-- Small decorative curls -->
      <path d="M20,10 Q18,5 22,3 Q25,2 23,7" fill="none" stroke="#B59255" stroke-width="0.4"/>
      <path d="M60,10 Q62,5 58,3 Q55,2 57,7" fill="none" stroke="#B59255" stroke-width="0.4"/>
    </g>
    <!-- Subtle aging texture pattern -->
    <pattern id="aging" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="30" r="0.3" fill="#B59255" opacity="0.15"/>
      <circle cx="70" cy="60" r="0.4" fill="#B59255" opacity="0.1"/>
      <circle cx="45" cy="80" r="0.3" fill="#9E7D3E" opacity="0.08"/>
      <circle cx="85" cy="15" r="0.5" fill="#B59255" opacity="0.07"/>
      <circle cx="10" cy="70" r="0.3" fill="#9E7D3E" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background - vintage sepia -->
  <rect width="400" height="600" fill="#DCCBB7"/>

  <!-- Phone mockup silhouette -->
  <g filter="url(#phone-shadow)">
    <rect x="55" y="30" width="290" height="540" rx="35" ry="35" fill="#2D2A26"/>
    <rect x="60" y="38" width="280" height="524" rx="30" ry="30" fill="#EDE0D2"/>
    <rect x="165" y="38" width="70" height="14" rx="7" ry="7" fill="#2D2A26"/>
    <rect x="62" y="54" width="276" height="506" rx="0" ry="0" fill="url(#vintage-bg)"/>
  </g>

  <!-- Invitation card inside phone -->
  <g transform="translate(82, 75) rotate(-1.5) scale(0.96)" filter="url(#card-shadow)">
    <!-- Card background - aged paper -->
    <rect x="0" y="0" width="240" height="460" rx="3" ry="3" fill="url(#vintage-bg)"/>
    <!-- Aging texture overlay -->
    <rect x="0" y="0" width="240" height="460" rx="3" ry="3" fill="url(#aging)"/>

    <!-- Vintage double border -->
    <rect x="8" y="8" width="224" height="444" rx="2" ry="2" fill="none" stroke="url(#vintage-border)" stroke-width="1.2"/>
    <rect x="12" y="12" width="216" height="436" rx="1" ry="1" fill="none" stroke="#B59255" stroke-width="0.5" stroke-dasharray="3,2"/>

    <!-- Decorative corners -->
    <use href="#vintage-corner" x="15" y="15"/>
    <use href="#vintage-corner" x="175" y="15" transform="scale(-1,1) translate(-190,0)"/>
    <use href="#vintage-corner" x="15" y="375" transform="scale(1,-1) translate(0,-390)"/>
    <use href="#vintage-corner" x="175" y="375" transform="scale(-1,-1) translate(-190,-390)"/>

    <!-- Top flourish -->
    <use href="#vintage-flourish" x="80" y="55"/>

    <!-- "Приглашение" in retro style -->
    <text x="120" y="105" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="13" fill="#9E7D3E" letter-spacing="0.2em" font-weight="400" font-style="italic">Приглашение</text>

    <!-- Decorative divider -->
    <use href="#vintage-flourish" x="80" y="110"/>

    <!-- Pre-text -->
    <text x="120" y="155" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="9" fill="#6B665C" letter-spacing="0.1em" font-style="italic">Имеем честь пригласить Вас</text>

    <!-- Names - vintage script -->
    <text x="120" y="200" text-anchor="middle" font-family="'Great Vibes', 'Brush Script MT', cursive" font-size="30" fill="#4A4640">Анна</text>
    <text x="120" y="222" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="14" fill="#B59255" font-style="italic">&amp;</text>
    <text x="120" y="260" text-anchor="middle" font-family="'Great Vibes', 'Brush Script MT', cursive" font-size="30" fill="#4A4640">Дмитрий</text>

    <!-- Decorative divider -->
    <line x1="55" y1="278" x2="185" y2="278" stroke="#B59255" stroke-width="0.6"/>
    <circle cx="120" cy="278" r="2" fill="#C9A96E" opacity="0.5"/>

    <!-- Date - vintage style -->
    <text x="120" y="308" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="12" fill="#4A4640" letter-spacing="0.08em">15 августа 2026</text>

    <!-- Time -->
    <text x="120" y="328" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="9" fill="#6B665C" font-style="italic">в 16:00</text>

    <!-- Venue -->
    <text x="120" y="355" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="8.5" fill="#8A8578" letter-spacing="0.05em">Усадьба «Лесная поляна»</text>
    <text x="120" y="368" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="7.5" fill="#A8A296" font-style="italic">Московская область</text>

    <!-- Bottom flourish -->
    <use href="#vintage-flourish" x="80" y="390"/>

    <!-- Vintage seal/stamp hint -->
    <circle cx="120" cy="425" r="8" fill="none" stroke="#B59255" stroke-width="0.5" opacity="0.4"/>
    <circle cx="120" cy="425" r="5" fill="none" stroke="#B59255" stroke-width="0.3" opacity="0.3"/>
    <text x="120" y="428" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="5" fill="#B59255" opacity="0.4">2026</text>
  </g>

  <!-- Phone home indicator -->
  <rect x="170" y="550" width="60" height="4" rx="2" fill="#1A1816" opacity="0.3"/>
</svg>
