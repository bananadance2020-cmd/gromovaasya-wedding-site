    <polygon points="94,112 96,107 98,112 103,112 99,115 100.5,120 96,117 91.5,120 93,115 89,112" transform="scale(0.9) translate(11,12)"/>
    <polygon points="110,112 112,107 114,112 119,112 115,115 116.5,120 112,117 107.5,120 109,115 105,112" transform="scale(0.9) translate(13,12)"/>
