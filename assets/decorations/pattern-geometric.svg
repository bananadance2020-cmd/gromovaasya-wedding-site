<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#7ECDC0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Diamond grid pattern -->
  <!-- Row 1 -->
  <polygon points="25,5 35,15 25,25 15,15"/>
  <polygon points="75,5 85,15 75,25 65,15"/>
  <!-- Row 2 -->
  <polygon points="50,15 60,25 50,35 40,25"/>
  <!-- Row 3 -->
  <polygon points="25,35 35,45 25,55 15,45"/>
  <polygon points="75,35 85,45 75,55 65,45"/>
  <!-- Row 4 -->
  <polygon points="50,45 60,55 50,65 40,55"/>
  <!-- Row 5 -->
  <polygon points="25,65 35,75 25,85 15,75"/>
  <polygon points="75,65 85,75 75,85 65,75"/>
  <!-- Row 6 -->
  <polygon points="50,75 60,85 50,95 40,85"/>
  <!-- Connecting diagonal lines -->
  <line x1="25" y1="25" x2="50" y2="15"/>
  <line x1="50" y1="15" x2="75" y2="25"/>
  <line x1="25" y1="35" x2="50" y2="45"/>
  <line x1="50" y1="45" x2="75" y2="35"/>
  <line x1="25" y1="55" x2="50" y2="45"/>
  <line x1="50" y1="45" x2="75" y2="55"/>
  <line x1="25" y1="65" x2="50" y2="75"/>
  <line x1="50" y1="75" x2="75" y2="65"/>
  <!-- Corner accent dots -->
  <circle cx="5" cy="5" r="1"/>
  <circle cx="95" cy="5" r="1"/>
  <circle cx="5" cy="95" r="1"/>
  <circle cx="95" cy="95" r="1"/>
  <!-- Edge accent dots -->
  <circle cx="50" cy="5" r="1"/>
  <circle cx="50" cy="95" r="1"/>
  <circle cx="5" cy="50" r="1"/>
  <circle cx="95" cy="50" r="1"/>
  <!-- Inner diamond accents -->
  <circle cx="25" cy="5" r="1.5"/>
  <circle cx="75" cy="5" r="1.5"/>
  <circle cx="25" cy="95" r="1.5"/>
  <circle cx="75" cy="95" r="1.5"/>
  <!-- Cross lines -->
  <line x1="0" y1="50" x2="10" y2="50"/>
  <line x1="90" y1="50" x2="100" y2="50"/>
  <line x1="50" y1="0" x2="50" y2="5"/>
  <line x1="50" y1="95" x2="50" y2="100"/>
</svg>
